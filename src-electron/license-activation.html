<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisans Aktivasyonu — Caller ID</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* Title bar drag area */
    .title-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      background: #020617;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding-left: 14px;
    }
    .title-bar span {
      font-size: 11px;
      color: #475569;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 44px 36px;
      width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      text-align: center;
      margin-top: 32px;
    }

    .logo {
      width: 160px;
      margin-bottom: 24px;
    }

    .card h1 {
      font-size: 19px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: #f1f5f9;
      letter-spacing: 0.08em;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      font-family: 'Courier New', monospace;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #475569; letter-spacing: 0; font-family: 'Segoe UI', sans-serif; }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 13px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: default; }

    .msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
      border-radius: 6px;
      padding: 6px 10px;
    }
    .msg.error { color: #f87171; background: rgba(239,68,68,0.1); }
    .msg.success { color: #4ade80; background: rgba(74,222,128,0.1); }
    .msg.info { color: #60a5fa; }

    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      color: #60a5fa;
      font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-icon {
      width: 16px; height: 16px;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .footer {
      position: fixed;
      bottom: 14px;
      font-size: 11px;
      color: #334155;
    }
  </style>
</head>
<body>

  <div class="title-bar">
    <span>Caller ID — Lisans Aktivasyonu</span>
  </div>

  <div class="card">
    <img src="../src/assets/logo.png" alt="Gaziburma" class="logo" onerror="this.style.display='none'" />

    <h1>Lisans Anahtarı Gerekli</h1>
    <p>Bu programı kullanmak için geçerli bir lisans anahtarı girmeniz gerekmektedir.</p>

    <input
      id="keyInput"
      type="text"
      placeholder="XXXXX-XXXX-XXX"
      autocomplete="off"
      spellcheck="false"
    />

    <button id="activateBtn" onclick="activate()">Etkinleştir</button>

    <div id="msgArea" class="msg"></div>
  </div>

  <div class="footer">TeknoGöz Bilişim Sistemleri &mdash; Caller ID v1.0</div>

  <script>
    const input = document.getElementById('keyInput');
    const btn   = document.getElementById('activateBtn');
    const msg   = document.getElementById('msgArea');

    input.focus();
    input.addEventListener('keydown', e => { if (e.key === 'Enter') activate(); });

    async function activate() {
      const key = input.value.trim();
      if (!key) {
        showMsg('Lütfen lisans anahtarını girin.', 'error');
        return;
      }

      btn.disabled = true;
      msg.className = 'msg info';
      msg.innerHTML = '<div class="spinner-wrap"><div class="spin-icon"></div> Doğrulanıyor...</div>';

      try {
        const result = await window.electronAPI.activateLicense(key);
        if (result.valid) {
          showMsg('✓ Lisans doğrulandı! Program açılıyor...', 'success');
          setTimeout(() => window.electronAPI.licenseSuccess(), 1200);
        } else {
          showMsg('✗ ' + result.message, 'error');
          btn.disabled = false;
        }
      } catch (e) {
        showMsg('Bağlantı hatası: ' + e.message, 'error');
        btn.disabled = false;
      }
    }

    function showMsg(text, type) {
      msg.className = 'msg ' + type;
      msg.textContent = text;
    }
  </script>
</body>
</html>
