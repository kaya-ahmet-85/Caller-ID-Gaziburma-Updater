<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Caller ID — Giriş</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
      user-select: none;
    }

    /* Drag bölgesi — başlık çubuğu olmadığı için taşıma buradan */
    .drag-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      -webkit-app-region: drag;
      z-index: 10;
    }

    .card {
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 380px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.3px;
    }
    .logo p {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    input[type=password], input[type=text] {
      width: 100%;
      padding: 13px 44px 13px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1.5px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #38bdf8;
    }
    .toggle-eye {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #64748b;
      font-size: 18px;
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .toggle-eye:hover { color: #38bdf8; }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: #0f172a;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-box {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      color: #fca5a5;
      font-size: 13px;
      font-weight: 500;
    }
    .error-box.show { display: flex; }

    /* Şifremi unuttum */
    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
      text-decoration: underline;
      background: none; border: none;
    }
    .forgot-link:hover { color: #38bdf8; }

    /* ---- Gizli Soru Paneli ---- */
    #forgot-panel { display: none; margin-top: 24px; }
    #forgot-panel.show { display: block; }
    .divider {
      border: none;
      border-top: 1px solid rgba(148,163,184,0.15);
      margin: 20px 0;
    }
    .question-text {
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: rgba(56,189,248,0.12);
      color: #38bdf8;
      border: 1.5px solid rgba(56,189,248,0.3);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-secondary:hover { background: rgba(56,189,248,0.2); }

    .success-box {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      color: #86efac;
      font-size: 13px;
      font-weight: 500;
    }
    .success-box.show { display: flex; }
  </style>
</head>
<body>
  <div class="drag-bar"></div>

  <div class="card">
    <div class="logo">
      <span class="logo-icon">🔒</span>
      <h1>Caller ID</h1>
      <p>Devam etmek için parolanızı girin</p>
    </div>

    <!-- Hata -->
    <div class="error-box" id="error-box">
      <span>⚠️</span>
      <span id="error-msg">Hatalı parola. Lütfen tekrar deneyin.</span>
    </div>

    <!-- Başarı (şifre sıfırlandı) -->
    <div class="success-box" id="success-box">
      <span>✅</span>
      <span>Parola sıfırlandı! Şimdi giriş yapabilirsiniz.</span>
    </div>

    <!-- Parola alanı -->
    <label for="pwd-input">Parola</label>
    <div class="input-wrap">
      <input type="password" id="pwd-input" placeholder="Parolanızı girin" autofocus />
      <button class="toggle-eye" id="toggle-eye" tabindex="-1" title="Göster/Gizle">👁️</button>
    </div>

    <button class="btn-primary" id="btn-login">Giriş Yap</button>
    <button class="forgot-link" id="forgot-btn">Parolamı unuttum</button>

    <!-- Gizli Soru Paneli -->
    <div id="forgot-panel">
      <hr class="divider" />
      <div class="question-text" id="question-text">Soru yükleniyor...</div>

      <div class="error-box" id="forgot-error-box">
        <span>⚠️</span>
        <span id="forgot-error-msg">Yanlış cevap.</span>
      </div>

      <label for="answer-input">Cevabınız</label>
      <div class="input-wrap">
        <input type="text" id="answer-input" placeholder="Cevabınızı girin" />
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;">
        <label for="new-pwd-input" style="margin-top:4px;">Yeni Parola</label>
        <div class="input-wrap">
          <input type="password" id="new-pwd-input" placeholder="Yeni parolanızı girin" />
        </div>
        <button class="btn-secondary" id="btn-reset">Parolayı Sıfırla</button>
      </div>
    </div>
  </div>

  <script>
    const pwdInput   = document.getElementById('pwd-input');
    const btnLogin   = document.getElementById('btn-login');
    const errorBox   = document.getElementById('error-box');
    const errorMsg   = document.getElementById('error-msg');
    const toggleEye  = document.getElementById('toggle-eye');
    const forgotBtn  = document.getElementById('forgot-btn');
    const forgotPanel = document.getElementById('forgot-panel');
    const questionText = document.getElementById('question-text');
    const answerInput = document.getElementById('answer-input');
    const newPwdInput = document.getElementById('new-pwd-input');
    const btnReset    = document.getElementById('btn-reset');
    const forgotErrBox = document.getElementById('forgot-error-box');
    const forgotErrMsg = document.getElementById('forgot-error-msg');
    const successBox  = document.getElementById('success-box');

    let eyeVisible = false;
    toggleEye.addEventListener('click', () => {
      eyeVisible = !eyeVisible;
      pwdInput.type = eyeVisible ? 'text' : 'password';
      toggleEye.textContent = eyeVisible ? '🙈' : '👁️';
    });

    async function tryLogin() {
      const pwd = pwdInput.value.trim();
      if (!pwd) return;
      btnLogin.disabled = true;
      btnLogin.textContent = 'Doğrulanıyor...';
      const ok = await window.electronAPI.verifyPassword(pwd);
      if (ok) {
        window.electronAPI.passwordSuccess();
      } else {
        errorBox.classList.add('show');
        errorMsg.textContent = 'Hatalı parola. Lütfen tekrar deneyin.';
        pwdInput.value = '';
        pwdInput.focus();
        btnLogin.disabled = false;
        btnLogin.textContent = 'Giriş Yap';
      }
    }

    btnLogin.addEventListener('click', tryLogin);
    pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    // Şifremi unuttum
    forgotBtn.addEventListener('click', async () => {
      forgotPanel.classList.toggle('show');
      if (forgotPanel.classList.contains('show')) {
        const q = await window.electronAPI.getSecretQuestion();
        questionText.textContent = q || 'Gizli soru bulunamadı.';
        answerInput.focus();
      }
    });

    btnReset.addEventListener('click', async () => {
      forgotErrBox.classList.remove('show');
      const answer = answerInput.value;
      const newPwd = newPwdInput.value.trim();
      if (!answer || !newPwd) {
        forgotErrBox.classList.add('show');
        forgotErrMsg.textContent = 'Lütfen cevabı ve yeni parolayı doldurun.';
        return;
      }
      const ok = await window.electronAPI.verifySecretAnswer(answer);
      if (!ok) {
        forgotErrBox.classList.add('show');
        forgotErrMsg.textContent = 'Yanlış cevap. Lütfen tekrar deneyin.';
        return;
      }
      const result = await window.electronAPI.resetPassword(newPwd);
      if (result.success) {
        forgotPanel.classList.remove('show');
        successBox.classList.add('show');
        newPwdInput.value = '';
        answerInput.value = '';
        pwdInput.value = '';
        pwdInput.focus();
      }
    });
  </script>
</body>
</html>
